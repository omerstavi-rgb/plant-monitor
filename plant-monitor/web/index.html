<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Monitor - ניטור צמחים</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f1923;
            --card: #1a2732;
            --card-border: #2a3f4f;
            --text: #e0e8ef;
            --text-dim: #7a8f9f;
            --green: #4caf50;
            --green-light: #81c784;
            --yellow: #ffc107;
            --red: #f44336;
            --blue: #42a5f5;
            --accent: #26a69a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1b5e20, #2e7d32, #1b5e20);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header h1 { font-size: 1.6em; }

        .header-info {
            display: flex;
            gap: 20px;
            align-items: center;
            font-size: 0.9em;
            color: rgba(255,255,255,0.8);
        }

        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 6px;
        }
        .status-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .status-dot.offline { background: var(--red); }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        .device-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .device-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .device-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .device-card.selected {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(38,166,154,0.2);
        }

        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .device-name { font-size: 1.2em; font-weight: 600; }

        .device-id {
            color: var(--text-dim);
            font-size: 0.85em;
            background: rgba(255,255,255,0.05);
            padding: 2px 10px;
            border-radius: 12px;
        }

        .moisture-display { text-align: center; margin: 20px 0; }

        .moisture-circle {
            width: 140px; height: 140px;
            border-radius: 50%;
            margin: 0 auto;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative;
        }

        .moisture-circle::before {
            content: ''; position: absolute; inset: 0;
            border-radius: 50%;
            border: 6px solid rgba(255,255,255,0.1);
        }

        .moisture-circle::after {
            content: ''; position: absolute; inset: 0;
            border-radius: 50%;
            border: 6px solid transparent;
            border-top-color: var(--circle-color, var(--green));
            border-right-color: var(--circle-color, var(--green));
            transform: rotate(var(--rotation, 0deg));
            transition: all 0.5s ease;
        }

        .moisture-value { font-size: 2.5em; font-weight: 700; line-height: 1; }
        .moisture-label { font-size: 0.85em; color: var(--text-dim); margin-top: 4px; }

        .water-status {
            text-align: center; margin-top: 16px; padding: 10px;
            border-radius: 10px; font-weight: 600; font-size: 0.95em;
        }
        .water-status.needs-water {
            background: rgba(244,67,54,0.15); color: var(--red);
            border: 1px solid rgba(244,67,54,0.3);
        }
        .water-status.ok {
            background: rgba(76,175,80,0.15); color: var(--green-light);
            border: 1px solid rgba(76,175,80,0.3);
        }
        .water-status.wet {
            background: rgba(66,165,245,0.15); color: var(--blue);
            border: 1px solid rgba(66,165,245,0.3);
        }

        .interval-control {
            display: flex; align-items: center; gap: 8px;
            margin-top: 12px; padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
        }
        .interval-control label {
            color: var(--text-dim); font-size: 0.85em; white-space: nowrap;
        }
        .interval-select {
            flex: 1; padding: 6px 10px;
            background: var(--bg); color: var(--text);
            border: 1px solid var(--card-border); border-radius: 8px;
            font-size: 0.9em; cursor: pointer;
        }
        .interval-select:focus { outline: none; border-color: var(--accent); }

        .device-meta {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 8px; margin-top: 16px; font-size: 0.85em;
        }

        .meta-item {
            background: rgba(255,255,255,0.03);
            padding: 8px 12px; border-radius: 8px;
        }
        .meta-item .label { color: var(--text-dim); font-size: 0.85em; }
        .meta-item .value { font-weight: 600; margin-top: 2px; }

        /* ===================== טבלת מדידות ===================== */
        .section {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 { font-size: 1.2em; }

        .tab-buttons {
            display: flex; gap: 8px;
        }

        .tab-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--card-border);
            color: var(--text-dim);
            padding: 6px 16px; border-radius: 8px;
            cursor: pointer; transition: all 0.2s; font-size: 0.85em;
        }
        .tab-btn:hover { background: rgba(255,255,255,0.1); }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .readings-table {
            width: 100%;
            border-collapse: collapse;
        }

        .readings-table th {
            text-align: right;
            padding: 10px 12px;
            border-bottom: 2px solid var(--card-border);
            color: var(--text-dim);
            font-size: 0.85em;
            font-weight: 600;
        }

        .readings-table td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9em;
        }

        .readings-table tr:hover td {
            background: rgba(255,255,255,0.03);
        }

        .moisture-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.85em;
        }

        .chart-container { position: relative; height: 300px; }

        .view-toggle { display: flex; gap: 8px; }

        .no-data { text-align: center; padding: 60px 20px; color: var(--text-dim); }
        .no-data .icon { font-size: 3em; margin-bottom: 16px; }
        .no-data h3 { margin-bottom: 8px; color: var(--text); }

        .battery-indicator {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 10px; border-radius: 8px;
            background: rgba(255,255,255,0.03);
            font-size: 0.85em; margin-top: 10px;
        }
        .battery-bar {
            width: 28px; height: 14px;
            border: 2px solid var(--text-dim);
            border-radius: 3px; position: relative;
            display: inline-block;
        }
        .battery-bar::after {
            content: ''; position: absolute;
            right: -5px; top: 3px;
            width: 3px; height: 6px;
            background: var(--text-dim);
            border-radius: 0 2px 2px 0;
        }
        .battery-fill {
            height: 100%; border-radius: 1px;
            transition: width 0.3s;
        }

        .plant-control {
            margin-top: 8px; padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
        }
        .plant-control label {
            color: var(--text-dim); font-size: 0.85em; white-space: nowrap;
        }
        .plant-search-wrapper {
            position: relative; margin-top: 6px;
        }
        .plant-search-input {
            width: 100%; padding: 8px 12px;
            background: var(--bg); color: var(--text);
            border: 1px solid var(--card-border); border-radius: 8px;
            font-size: 0.9em;
        }
        .plant-search-input:focus { outline: none; border-color: var(--accent); }
        .plant-search-results {
            position: absolute; top: 100%; left: 0; right: 0;
            background: var(--card); border: 1px solid var(--card-border);
            border-radius: 0 0 8px 8px; max-height: 200px; overflow-y: auto;
            z-index: 100; display: none;
        }
        .plant-search-results.show { display: block; }
        .plant-result-item {
            padding: 8px 12px; cursor: pointer; font-size: 0.85em;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .plant-result-item:hover { background: rgba(255,255,255,0.08); }
        .plant-result-item .plant-name { font-weight: 600; }
        .plant-result-item .plant-info { color: var(--text-dim); font-size: 0.8em; margin-top: 2px; }
        .plant-current {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.9em; font-weight: 600; color: var(--accent);
            margin-bottom: 4px;
        }
        .plant-tip {
            font-size: 0.8em; color: var(--text-dim); margin-top: 4px;
        }

        .footer { text-align: center; padding: 20px; color: var(--text-dim); font-size: 0.85em; }

        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 10px; text-align: center; }
            .header-info { flex-direction: column; gap: 8px; }
            .device-grid { grid-template-columns: 1fr; }
            .container { padding: 12px; }
            .section-header { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Plant Monitor 🌱</h1>
    <div class="header-info">
        <span id="deviceCount">0 מכשירים</span>
        <span id="lastUpdate">עדכון אחרון: --</span>
        <span><span class="status-dot" id="serverStatus"></span> שרת</span>
    </div>
</div>

<div class="container">
    <div class="device-grid" id="deviceGrid">
        <div class="no-data">
            <div class="icon">🌿</div>
            <h3>ממתין לנתונים...</h3>
            <p>חבר את ה-ESP32 לרשת WiFi והנתונים יופיעו כאן</p>
        </div>
    </div>

    <!-- מדידות - טבלה + גרף -->
    <div class="section">
        <div class="section-header">
            <h2>📋 מדידות אחרונות</h2>
            <div style="display:flex; gap: 16px; align-items: center;">
                <div class="view-toggle">
                    <button class="tab-btn active" onclick="setView('table', this)">רשימה</button>
                    <button class="tab-btn" onclick="setView('chart', this)">גרף</button>
                </div>
                <div class="tab-buttons">
                    <button class="tab-btn" onclick="setTimeRange(6)">6 שעות</button>
                    <button class="tab-btn active" onclick="setTimeRange(24)">24 שעות</button>
                    <button class="tab-btn" onclick="setTimeRange(72)">3 ימים</button>
                    <button class="tab-btn" onclick="setTimeRange(168)">שבוע</button>
                </div>
            </div>
        </div>

        <!-- תצוגת טבלה -->
        <div id="tableView">
            <table class="readings-table">
                <thead>
                    <tr>
                        <th>תאריך ושעה</th>
                        <th>לחות</th>
                        <th>ערך חיישן (0-4095)</th>
                        <th>סטטוס</th>
                    </tr>
                </thead>
                <tbody id="readingsBody">
                    <tr><td colspan="4" style="text-align:center; padding: 40px; color: var(--text-dim);">ממתין לנתונים...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- תצוגת גרף -->
        <div id="chartView" style="display:none;">
            <div class="chart-container">
                <canvas id="moistureChart"></canvas>
            </div>
        </div>
    </div>
</div>

<div class="footer">
    Plant Monitor v1.1 | ESP32 + Capacitive Soil Moisture Sensor
</div>

<script>
    const API_BASE = window.location.origin;
    const REFRESH_INTERVAL = 15000; // 15 שניות
    let selectedDevice = null;
    let timeRange = 24;
    let moistureChart = null;
    let currentView = 'table';
    let lastReadings = [];
    let plantTypes = [];

    document.addEventListener('DOMContentLoaded', () => {
        initChart();
        fetchPlantTypes();
        fetchDevices();
        setInterval(fetchDevices, REFRESH_INTERVAL);
    });

    async function fetchPlantTypes() {
        try {
            const res = await fetch(`${API_BASE}/api/plants`);
            plantTypes = await res.json();
        } catch (err) {
            console.error('Error fetching plants:', err);
        }
    }

    // ===================== API =====================
    async function fetchDevices() {
        try {
            const res = await fetch(`${API_BASE}/api/devices`);
            const devices = await res.json();

            document.getElementById('serverStatus').className = 'status-dot online';
            document.getElementById('deviceCount').textContent = `${devices.length} מכשירים`;
            document.getElementById('lastUpdate').textContent =
                `עדכון אחרון: ${new Date().toLocaleTimeString('he-IL')}`;

            renderDevices(devices);

            if (devices.length > 0) {
                if (!selectedDevice) selectedDevice = devices[0].device_id;
                fetchReadings(selectedDevice);
            }
        } catch (err) {
            document.getElementById('serverStatus').className = 'status-dot offline';
        }
    }

    async function fetchReadings(deviceId) {
        try {
            const res = await fetch(`${API_BASE}/api/readings/${deviceId}?hours=${timeRange}`);
            lastReadings = await res.json();
            renderTable(lastReadings);
            updateChart(lastReadings);
        } catch (err) {
            console.error('Error:', err);
        }
    }

    // ===================== Render =====================
    function renderDevices(devices) {
        const grid = document.getElementById('deviceGrid');

        if (devices.length === 0) {
            grid.innerHTML = `
                <div class="no-data">
                    <div class="icon">🌿</div>
                    <h3>ממתין לנתונים...</h3>
                    <p>חבר את ה-ESP32 לרשת WiFi והנתונים יופיעו כאן</p>
                </div>`;
            return;
        }

        grid.innerHTML = devices.map(device => {
            const moisture = device.last_moisture ?? '--';
            const color = getMoistureColor(moisture);
            const statusInfo = getWaterStatus(moisture, device);
            const lastSeen = device.last_reading_time
                ? timeAgo(new Date(device.last_reading_time + 'Z'))
                : 'לא ידוע';
            const isSelected = device.device_id === selectedDevice;

            // סוללה (-1 = Power Bank, null = אין נתון)
            const battery = device.battery_percent;
            const isPowerBank = battery === -1;
            const batteryColor = isPowerBank ? '#42a5f5' : battery == null ? '#7a8f9f' : battery > 50 ? '#4caf50' : battery > 20 ? '#ffc107' : '#f44336';
            const batteryText = isPowerBank ? 'מחובר לחשמל' : battery != null ? `${battery}%` : 'לא ידוע';
            const batteryWidth = isPowerBank ? 100 : battery != null ? Math.max(2, battery) : 0;

            // סוג צמח
            const currentPlant = device.plant_type || 'ficus_benjamina';
            const plantInfo = plantTypes.find(p => p.id === currentPlant);
            const plantName = plantInfo ? `${plantInfo.name_he} (${plantInfo.name_en})` : currentPlant;
            const plantTip = plantInfo ? plantInfo.water_tip_he : '';

            return `
                <div class="device-card ${isSelected ? 'selected' : ''}"
                     onclick="selectDevice(${device.device_id})">
                    <div class="device-header">
                        <div class="device-name">${device.device_name || 'צמח ' + device.device_id}</div>
                        <div class="device-id">#${device.device_id}</div>
                    </div>

                    <div class="moisture-display">
                        <div class="moisture-circle" style="--circle-color: ${color}; --rotation: ${moisture !== '--' ? (moisture * 3.6 / 2) : 0}deg">
                            <div class="moisture-value" style="color: ${color}">
                                ${moisture}${moisture !== '--' ? '%' : ''}
                            </div>
                            <div class="moisture-label">לחות</div>
                        </div>
                    </div>

                    <div class="water-status ${statusInfo.class}">
                        ${statusInfo.text}
                    </div>

                    <div class="battery-indicator" onclick="event.stopPropagation()">
                        <div class="battery-bar">
                            <div class="battery-fill" style="width:${batteryWidth}%; background:${batteryColor}"></div>
                        </div>
                        <span style="color:${batteryColor}; font-weight:600;">${isPowerBank ? '🔌' : '🔋'} ${batteryText}</span>
                    </div>

                    <div class="plant-control" onclick="event.stopPropagation()">
                        <div class="plant-current">🌱 ${plantName}</div>
                        ${plantTip ? `<div class="plant-tip">💧 ${plantTip}</div>` : ''}
                        <div class="plant-search-wrapper">
                            <input type="text" class="plant-search-input"
                                   placeholder="חפש צמח..."
                                   oninput="searchPlant(${device.device_id}, this)"
                                   onfocus="searchPlant(${device.device_id}, this)"
                                   onblur="setTimeout(()=>closePlantSearch(this), 200)">
                            <div class="plant-search-results" id="plantResults_${device.device_id}"></div>
                        </div>
                    </div>

                    <div class="interval-control" onclick="event.stopPropagation()">
                        <label>⏱ מדידה כל:</label>
                        <select class="interval-select" onchange="changeInterval(${device.device_id}, this.value)">
                            <option value="5" ${(device.interval_minutes||30)==5?'selected':''}>5 דקות</option>
                            <option value="10" ${(device.interval_minutes||30)==10?'selected':''}>10 דקות</option>
                            <option value="15" ${(device.interval_minutes||30)==15?'selected':''}>15 דקות</option>
                            <option value="30" ${(device.interval_minutes||30)==30?'selected':''}>30 דקות</option>
                            <option value="60" ${(device.interval_minutes||30)==60?'selected':''}>שעה</option>
                            <option value="120" ${(device.interval_minutes||30)==120?'selected':''}>שעתיים</option>
                            <option value="360" ${(device.interval_minutes||30)==360?'selected':''}>6 שעות</option>
                            <option value="720" ${(device.interval_minutes||30)==720?'selected':''}>12 שעות</option>
                            <option value="1440" ${(device.interval_minutes||30)==1440?'selected':''}>יום</option>
                        </select>
                    </div>

                    <div class="device-meta">
                        <div class="meta-item">
                            <div class="label">ערך חיישן</div>
                            <div class="value">${device.last_raw ?? '--'} / 4095</div>
                        </div>
                        <div class="meta-item">
                            <div class="label">נראה לאחרונה</div>
                            <div class="value">${lastSeen}</div>
                        </div>
                        <div class="meta-item">
                            <div class="label">סף לחות</div>
                            <div class="value">${device.moisture_threshold_low ?? 30}% - ${device.moisture_threshold_high ?? 70}%</div>
                        </div>
                        <div class="meta-item">
                            <div class="label">מדידה הבאה</div>
                            <div class="value">~${device.interval_minutes || 30} דק'</div>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    function renderTable(readings) {
        const tbody = document.getElementById('readingsBody');

        if (!readings || readings.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px; color:var(--text-dim);">אין מדידות</td></tr>';
            return;
        }

        tbody.innerHTML = readings.map(r => {
            const date = new Date(r.timestamp + 'Z');
            const dateStr = date.toLocaleString('he-IL', {
                day: '2-digit', month: '2-digit', year: '2-digit',
                hour: '2-digit', minute: '2-digit'
            });
            const color = getMoistureColor(r.moisture_percent);
            const status = getSimpleStatus(r.moisture_percent);

            return `<tr>
                <td>${dateStr}</td>
                <td><span class="moisture-badge" style="background:${color}22; color:${color}">${r.moisture_percent}%</span></td>
                <td>${r.moisture_raw} / 4095</td>
                <td>${status}</td>
            </tr>`;
        }).join('');
    }

    // ===================== Chart =====================
    function initChart() {
        moistureChart = new Chart(document.getElementById('moistureChart'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'לחות %',
                    data: [],
                    borderColor: '#26a69a',
                    backgroundColor: 'rgba(38,166,154,0.1)',
                    fill: true, tension: 0.4,
                    pointRadius: 3, pointBackgroundColor: '#26a69a'
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#e0e8ef' } } },
                scales: {
                    x: { ticks: { color: '#7a8f9f', maxTicksLimit: 10 }, grid: { color: 'rgba(255,255,255,0.05)' } },
                    y: { min: 0, max: 100, ticks: { color: '#7a8f9f' }, grid: { color: 'rgba(255,255,255,0.05)' },
                         title: { display: true, text: 'לחות %', color: '#7a8f9f' } }
                }
            }
        });
    }

    function updateChart(readings) {
        if (!readings || readings.length === 0) return;
        const sorted = [...readings].reverse();
        moistureChart.data.labels = sorted.map(r => {
            const d = new Date(r.timestamp + 'Z');
            return d.toLocaleString('he-IL', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
        });
        moistureChart.data.datasets[0].data = sorted.map(r => r.moisture_percent);
        moistureChart.update('none');
    }

    // ===================== Actions =====================
    function selectDevice(deviceId) {
        selectedDevice = deviceId;
        fetchDevices();
    }

    function setView(view, btn) {
        currentView = view;
        document.getElementById('tableView').style.display = view === 'table' ? '' : 'none';
        document.getElementById('chartView').style.display = view === 'chart' ? '' : 'none';
        document.querySelectorAll('.view-toggle .tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function setTimeRange(hours) {
        timeRange = hours;
        document.querySelectorAll('.tab-buttons .tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        if (selectedDevice) fetchReadings(selectedDevice);
    }

    function searchPlant(deviceId, input) {
        const query = input.value.trim().toLowerCase();
        const resultsDiv = document.getElementById(`plantResults_${deviceId}`);

        // סינון מהמאגר המקומי (כבר טעון)
        let filtered = plantTypes;
        if (query.length > 0) {
            filtered = plantTypes.filter(p =>
                p.name_he.toLowerCase().includes(query) ||
                p.name_en.toLowerCase().includes(query) ||
                p.id.toLowerCase().includes(query)
            );
        }

        // הצגת עד 15 תוצאות
        const shown = filtered.slice(0, 15);
        resultsDiv.innerHTML = shown.map(p => `
            <div class="plant-result-item" onmousedown="selectPlant(${deviceId}, '${p.id}')">
                <div class="plant-name">${p.name_he} (${p.name_en})</div>
                <div class="plant-info">לחות: ${p.moisture_min}%-${p.moisture_max}% | ${p.water_tip_he}</div>
            </div>
        `).join('');

        if (shown.length === 0 && query.length > 0) {
            resultsDiv.innerHTML = '<div class="plant-result-item"><div class="plant-info">לא נמצא - נסה שם אחר</div></div>';
        }

        resultsDiv.classList.add('show');
    }

    function closePlantSearch(input) {
        const wrapper = input.closest('.plant-search-wrapper');
        const resultsDiv = wrapper.querySelector('.plant-search-results');
        resultsDiv.classList.remove('show');
        input.value = '';
    }

    async function selectPlant(deviceId, plantId) {
        try {
            await fetch(`${API_BASE}/api/device/${deviceId}/plant`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ plant_type: plantId })
            });
            fetchDevices();
        } catch (err) {
            console.error('Error changing plant type:', err);
        }
    }

    async function changeInterval(deviceId, minutes) {
        try {
            await fetch(`${API_BASE}/api/device/${deviceId}/settings`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ interval_minutes: parseInt(minutes) })
            });
            // ה-ESP32 יקבל את ההגדרה החדשה במדידה הבאה שלו
        } catch (err) {
            console.error('Error changing interval:', err);
        }
    }

    // ===================== Helpers =====================
    function getMoistureColor(value) {
        if (value === '--' || value === null) return '#7a8f9f';
        if (value < 30) return '#f44336';
        if (value < 50) return '#ffc107';
        if (value < 80) return '#4caf50';
        return '#42a5f5';
    }

    function getWaterStatus(moisture, device) {
        if (moisture === '--' || moisture === null) return { text: 'אין נתונים', class: '' };
        const low = device.moisture_threshold_low || 30;
        const high = device.moisture_threshold_high || 70;
        if (moisture < low) return { text: '💧 צריך השקיה!', class: 'needs-water' };
        if (moisture > high) return { text: '💦 רטוב מאוד', class: 'wet' };
        return { text: '✅ לחות תקינה', class: 'ok' };
    }

    function getSimpleStatus(percent) {
        if (percent < 30) return '🔴 צריך השקיה';
        if (percent < 50) return '🟡 קצת יבש';
        if (percent < 80) return '🟢 תקין';
        return '🔵 רטוב';
    }

    function timeAgo(date) {
        const seconds = Math.floor((new Date() - date) / 1000);
        if (seconds < 60) return 'עכשיו';
        if (seconds < 3600) return `לפני ${Math.floor(seconds / 60)} דקות`;
        if (seconds < 86400) return `לפני ${Math.floor(seconds / 3600)} שעות`;
        return `לפני ${Math.floor(seconds / 86400)} ימים`;
    }
</script>
