<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Monitor - ניטור צמחים</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f1923;
            --card: #1a2732;
            --card-border: #2a3f4f;
            --text: #e0e8ef;
            --text-dim: #7a8f9f;
            --green: #4caf50;
            --green-light: #81c784;
            --yellow: #ffc107;
            --red: #f44336;
            --blue: #42a5f5;
            --accent: #26a69a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1b5e20, #2e7d32, #1b5e20);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 1.6em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-info {
            display: flex;
            gap: 20px;
            align-items: center;
            font-size: 0.9em;
            color: rgba(255,255,255,0.8);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 6px;
        }

        .status-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .status-dot.offline { background: var(--red); }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .device-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .device-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .device-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .device-card.selected {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(38,166,154,0.2);
        }

        .device-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .device-name {
            font-size: 1.2em;
            font-weight: 600;
        }

        .device-id {
            color: var(--text-dim);
            font-size: 0.85em;
            background: rgba(255,255,255,0.05);
            padding: 2px 10px;
            border-radius: 12px;
        }

        .moisture-display {
            text-align: center;
            margin: 20px 0;
        }

        .moisture-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .moisture-circle::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 6px solid rgba(255,255,255,0.1);
        }

        .moisture-circle::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 6px solid transparent;
            border-top-color: var(--circle-color, var(--green));
            border-right-color: var(--circle-color, var(--green));
            transform: rotate(var(--rotation, 0deg));
            transition: all 0.5s ease;
        }

        .moisture-value {
            font-size: 2.5em;
            font-weight: 700;
            line-height: 1;
        }

        .moisture-label {
            font-size: 0.85em;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .device-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 16px;
            font-size: 0.85em;
        }

        .meta-item {
            background: rgba(255,255,255,0.03);
            padding: 8px 12px;
            border-radius: 8px;
        }

        .meta-item .label {
            color: var(--text-dim);
            font-size: 0.85em;
        }

        .meta-item .value {
            font-weight: 600;
            margin-top: 2px;
        }

        .measure-btn {
            display: block;
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--accent);
            background: rgba(38,166,154,0.1);
            color: var(--accent);
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .measure-btn:hover {
            background: var(--accent);
            color: white;
        }

        .measure-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .measure-btn.waiting {
            border-color: var(--yellow);
            color: var(--yellow);
            background: rgba(255,193,7,0.1);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .water-status {
            text-align: center;
            margin-top: 16px;
            padding: 10px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95em;
        }

        .water-status.needs-water {
            background: rgba(244,67,54,0.15);
            color: var(--red);
            border: 1px solid rgba(244,67,54,0.3);
        }

        .water-status.ok {
            background: rgba(76,175,80,0.15);
            color: var(--green-light);
            border: 1px solid rgba(76,175,80,0.3);
        }

        .water-status.wet {
            background: rgba(66,165,245,0.15);
            color: var(--blue);
            border: 1px solid rgba(66,165,245,0.3);
        }

        .chart-section {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-header h2 {
            font-size: 1.2em;
        }

        .time-buttons {
            display: flex;
            gap: 8px;
        }

        .time-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--card-border);
            color: var(--text-dim);
            padding: 6px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85em;
        }

        .time-btn:hover { background: rgba(255,255,255,0.1); }
        .time-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .no-data .icon { font-size: 3em; margin-bottom: 16px; }
        .no-data h3 { margin-bottom: 8px; color: var(--text); }

        .footer {
            text-align: center;
            padding: 20px;
            color: var(--text-dim);
            font-size: 0.85em;
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 10px; text-align: center; }
            .header-info { flex-direction: column; gap: 8px; }
            .device-grid { grid-template-columns: 1fr; }
            .container { padding: 12px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🌱 Plant Monitor</h1>
    <div class="header-info">
        <span id="deviceCount">0 מכשירים</span>
        <span id="lastUpdate">עדכון אחרון: --</span>
        <span>
            <span class="status-dot" id="serverStatus"></span>
            שרת
        </span>
    </div>
</div>

<div class="container">
    <!-- Device Cards -->
    <div class="device-grid" id="deviceGrid">
        <div class="no-data">
            <div class="icon">🌿</div>
            <h3>ממתין לנתונים...</h3>
            <p>חבר את ה-ESP32 לרשת WiFi והנתונים יופיעו כאן</p>
        </div>
    </div>

    <!-- Chart Section -->
    <div class="chart-section">
        <div class="chart-header">
            <h2>📊 גרף לחות לאורך זמן</h2>
            <div class="time-buttons">
                <button class="time-btn" onclick="setTimeRange(6)">6 שעות</button>
                <button class="time-btn active" onclick="setTimeRange(24)">24 שעות</button>
                <button class="time-btn" onclick="setTimeRange(72)">3 ימים</button>
                <button class="time-btn" onclick="setTimeRange(168)">שבוע</button>
            </div>
        </div>
        <div class="chart-container">
            <canvas id="moistureChart"></canvas>
        </div>
    </div>

    <!-- Raw Values Chart -->
    <div class="chart-section">
        <div class="chart-header">
            <h2>⚡ מתח וערכים גולמיים</h2>
        </div>
        <div class="chart-container">
            <canvas id="rawChart"></canvas>
        </div>
    </div>
</div>

<div class="footer">
    Plant Monitor v1.0 | ESP32 + Capacitive Soil Moisture Sensor
</div>

<script>
    // ===================== Configuration =====================
    const API_BASE = window.location.origin;
    const REFRESH_INTERVAL = 30000; // 30 seconds
    let selectedDevice = null;
    let timeRange = 24;
    let moistureChart = null;
    let rawChart = null;

    // ===================== Initialize =====================
    document.addEventListener('DOMContentLoaded', () => {
        initCharts();
        fetchDevices();
        setInterval(fetchDevices, REFRESH_INTERVAL);
    });

    // ===================== API Calls =====================
    async function fetchDevices() {
        try {
            const res = await fetch(`${API_BASE}/api/devices`);
            const devices = await res.json();

            document.getElementById('serverStatus').className = 'status-dot online';
            document.getElementById('deviceCount').textContent = `${devices.length} מכשירים`;
            document.getElementById('lastUpdate').textContent =
                `עדכון אחרון: ${new Date().toLocaleTimeString('he-IL')}`;

            renderDevices(devices);

            if (devices.length > 0) {
                if (!selectedDevice) selectedDevice = devices[0].device_id;
                fetchReadings(selectedDevice);
            }
        } catch (err) {
            document.getElementById('serverStatus').className = 'status-dot offline';
            console.error('Error fetching devices:', err);
        }
    }

    async function fetchReadings(deviceId) {
        try {
            const res = await fetch(`${API_BASE}/api/readings/${deviceId}?hours=${timeRange}`);
            const readings = await res.json();
            updateCharts(readings);
        } catch (err) {
            console.error('Error fetching readings:', err);
        }
    }

    // ===================== Render Devices =====================
    function renderDevices(devices) {
        const grid = document.getElementById('deviceGrid');

        if (devices.length === 0) {
            grid.innerHTML = `
                <div class="no-data">
                    <div class="icon">🌿</div>
                    <h3>ממתין לנתונים...</h3>
                    <p>חבר את ה-ESP32 לרשת WiFi והנתונים יופיעו כאן</p>
                </div>`;
            return;
        }

        grid.innerHTML = devices.map(device => {
            const moisture = device.last_moisture ?? '--';
            const color = getMoistureColor(moisture);
            const statusInfo = getWaterStatus(moisture, device);
            const lastSeen = device.last_reading_time
                ? timeAgo(new Date(device.last_reading_time + 'Z'))
                : 'לא ידוע';
            const isSelected = device.device_id === selectedDevice;

            return `
                <div class="device-card ${isSelected ? 'selected' : ''}"
                     onclick="selectDevice(${device.device_id})">
                    <div class="device-header">
                        <div class="device-name">${device.device_name || 'צמח ' + device.device_id}</div>
                        <div class="device-id">#${device.device_id}</div>
                    </div>

                    <div class="moisture-display">
                        <div class="moisture-circle" style="--circle-color: ${color}; --rotation: ${moisture !== '--' ? (moisture * 3.6 / 2) : 0}deg">
                            <div class="moisture-value" style="color: ${color}">
                                ${moisture}${moisture !== '--' ? '%' : ''}
                            </div>
                            <div class="moisture-label">לחות</div>
                        </div>
                    </div>

                    <div class="water-status ${statusInfo.class}">
                        ${statusInfo.text}
                    </div>

                    <button class="measure-btn" id="measureBtn_${device.device_id}"
                            onclick="event.stopPropagation(); requestMeasurement(${device.device_id})">
                        📡 מדידה עכשיו
                    </button>

                    <div class="device-meta">
                        <div class="meta-item">
                            <div class="label">מתח</div>
                            <div class="value">${device.last_voltage ? device.last_voltage.toFixed(2) + 'V' : '--'}</div>
                        </div>
                        <div class="meta-item">
                            <div class="label">ערך גולמי</div>
                            <div class="value">${device.last_raw ?? '--'}</div>
                        </div>
                        <div class="meta-item">
                            <div class="label">נראה לאחרונה</div>
                            <div class="value">${lastSeen}</div>
                        </div>
                        <div class="meta-item">
                            <div class="label">סף התראה</div>
                            <div class="value">${device.moisture_threshold_low ?? 30}%</div>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    // ===================== Charts =====================
    function initCharts() {
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    labels: { color: '#e0e8ef', font: { size: 12 } }
                }
            },
            scales: {
                x: {
                    ticks: { color: '#7a8f9f', maxTicksLimit: 10 },
                    grid: { color: 'rgba(255,255,255,0.05)' }
                },
                y: {
                    ticks: { color: '#7a8f9f' },
                    grid: { color: 'rgba(255,255,255,0.05)' }
                }
            }
        };

        moistureChart = new Chart(document.getElementById('moistureChart'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'לחות %',
                    data: [],
                    borderColor: '#26a69a',
                    backgroundColor: 'rgba(38,166,154,0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 3,
                    pointBackgroundColor: '#26a69a'
                }]
            },
            options: {
                ...commonOptions,
                scales: {
                    ...commonOptions.scales,
                    y: {
                        ...commonOptions.scales.y,
                        min: 0,
                        max: 100,
                        title: { display: true, text: 'לחות %', color: '#7a8f9f' }
                    }
                }
            }
        });

        rawChart = new Chart(document.getElementById('rawChart'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'ערך גולמי',
                        data: [],
                        borderColor: '#42a5f5',
                        backgroundColor: 'rgba(66,165,245,0.1)',
                        fill: true,
                        tension: 0.4,
                        yAxisID: 'y',
                        pointRadius: 2
                    },
                    {
                        label: 'מתח (V)',
                        data: [],
                        borderColor: '#ffc107',
                        backgroundColor: 'rgba(255,193,7,0.1)',
                        fill: false,
                        tension: 0.4,
                        yAxisID: 'y1',
                        pointRadius: 2
                    }
                ]
            },
            options: {
                ...commonOptions,
                scales: {
                    ...commonOptions.scales,
                    y: {
                        ...commonOptions.scales.y,
                        position: 'right',
                        title: { display: true, text: 'ערך גולמי', color: '#7a8f9f' }
                    },
                    y1: {
                        position: 'left',
                        ticks: { color: '#7a8f9f' },
                        grid: { display: false },
                        title: { display: true, text: 'מתח (V)', color: '#7a8f9f' }
                    }
                }
            }
        });
    }

    function updateCharts(readings) {
        if (!readings || readings.length === 0) return;

        // הפיכת הסדר כדי שהגרף יהיה מימין לשמאל (ישן → חדש)
        const sorted = [...readings].reverse();

        const labels = sorted.map(r => {
            const d = new Date(r.timestamp + 'Z');
            return d.toLocaleString('he-IL', {
                day: '2-digit', month: '2-digit',
                hour: '2-digit', minute: '2-digit'
            });
        });

        // Moisture chart
        moistureChart.data.labels = labels;
        moistureChart.data.datasets[0].data = sorted.map(r => r.moisture_percent);
        moistureChart.update('none');

        // Raw chart
        rawChart.data.labels = labels;
        rawChart.data.datasets[0].data = sorted.map(r => r.moisture_raw);
        rawChart.data.datasets[1].data = sorted.map(r => r.voltage);
        rawChart.update('none');
    }

    // ===================== Helpers =====================
    function selectDevice(deviceId) {
        selectedDevice = deviceId;
        fetchDevices();
    }

    function setTimeRange(hours) {
        timeRange = hours;
        document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        if (selectedDevice) fetchReadings(selectedDevice);
    }

    function getMoistureColor(value) {
        if (value === '--' || value === null) return '#7a8f9f';
        if (value < 30) return '#f44336';
        if (value < 50) return '#ffc107';
        if (value < 80) return '#4caf50';
        return '#42a5f5';
    }

    function getWaterStatus(moisture, device) {
        if (moisture === '--' || moisture === null) {
            return { text: 'אין נתונים', class: '' };
        }
        const low = device.moisture_threshold_low || 30;
        const high = device.moisture_threshold_high || 70;

        if (moisture < low) return { text: '💧 צריך השקיה!', class: 'needs-water' };
        if (moisture > high) return { text: '💦 רטוב מאוד', class: 'wet' };
        return { text: '✅ לחות תקינה', class: 'ok' };
    }

    async function requestMeasurement(deviceId) {
        const btn = document.getElementById(`measureBtn_${deviceId}`);
        btn.disabled = true;
        btn.className = 'measure-btn waiting';
        btn.textContent = '⏳ ממתין למדידה...';

        try {
            await fetch(`${API_BASE}/api/command/${deviceId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: 'measure' })
            });

            // בדיקה כל 5 שניות אם הגיעו נתונים חדשים
            let checks = 0;
            const maxChecks = 24; // 2 דקות מקסימום
            const checker = setInterval(async () => {
                checks++;
                await fetchDevices();

                if (checks >= maxChecks) {
                    clearInterval(checker);
                    btn.disabled = false;
                    btn.className = 'measure-btn';
                    btn.textContent = '📡 מדידה עכשיו';
                }
            }, 5000);

            // גם אם לא הגיע - אחרי 2 דקות מחזירים את הכפתור
            setTimeout(() => {
                btn.disabled = false;
                btn.className = 'measure-btn';
                btn.textContent = '📡 מדידה עכשיו';
            }, 120000);

        } catch (err) {
            console.error('Error requesting measurement:', err);
            btn.disabled = false;
            btn.className = 'measure-btn';
            btn.textContent = '📡 מדידה עכשיו';
        }
    }

    function timeAgo(date) {
        const seconds = Math.floor((new Date() - date) / 1000);
        if (seconds < 60) return 'עכשיו';
        if (seconds < 3600) return `לפני ${Math.floor(seconds / 60)} דקות`;
        if (seconds < 86400) return `לפני ${Math.floor(seconds / 3600)} שעות`;
        return `לפני ${Math.floor(seconds / 86400)} ימים`;
    }
</script>

</body>
</html>
